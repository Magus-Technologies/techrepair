<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Empresa</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <div class="container mt-5">
    <h3>Test de Búsqueda RUC</h3>
    
    <div class="mb-3">
      <label>RUC</label>
      <div class="input-group">
        <input type="text" id="rucInp" class="form-control" maxlength="11">
        <button type="button" class="btn btn-primary" id="btnBuscarRuc">Buscar</button>
      </div>
      <div id="msgRuc" class="mt-2"></div>
    </div>

    <div class="mb-3">
      <label>Razón Social</label>
      <input type="text" name="razon_social" class="form-control">
    </div>

    <div class="mb-3">
      <label>Dirección</label>
      <input type="text" name="direccion" class="form-control">
    </div>
  </div>

  <script>
    const rucInp = document.getElementById('rucInp');
    const btnBuscarRuc = document.getElementById('btnBuscarRuc');
    const msgRuc = document.getElementById('msgRuc');

    console.log('Elementos:', {rucInp, btnBuscarRuc, msgRuc});

    btnBuscarRuc.addEventListener('click', async () => {
      console.log('Click!');
      const doc = rucInp.value.trim();
      
      if (doc.length !== 11) {
        msgRuc.innerHTML = '<span class="text-danger">El RUC debe tener 11 dígitos.</span>';
        return;
      }

      btnBuscarRuc.disabled = true;
      btnBuscarRuc.textContent = 'Buscando...';
      msgRuc.innerHTML = '';

      try {
        const url = 'http://localhost/techrepair/modules/clientes/api_documento.php?doc=' + doc;
        console.log('URL:', url);
        const r = await fetch(url);
        const j = await r.json();
        console.log('Respuesta:', j);

        if (!j.ok) {
          msgRuc.innerHTML = '<span class="text-danger">' + (j.error || 'No encontrado') + '</span>';
          return;
        }

        document.querySelector('input[name="razon_social"]').value = j.data.razon_social || '';
        document.querySelector('input[name="direccion"]').value = j.data.direccion || '';
        msgRuc.innerHTML = '<span class="text-success">✓ ' + j.data.razon_social + '</span>';
      } catch (err) {
        console.error('Error:', err);
        msgRuc.innerHTML = '<span class="text-danger">Error: ' + err.message + '</span>';
      } finally {
        btnBuscarRuc.disabled = false;
        btnBuscarRuc.textContent = 'Buscar';
      }
    });
  </script>
</body>
</html>
